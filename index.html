<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SC | Rapz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
            background: #000; color: white; margin: 0; overflow: hidden;
        }

        .emoji {
            display: inline-block;
            width: 1.2em;
            height: 1.2em;
            vertical-align: -0.2em;
            margin: 0 0.1em;
        }

        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% -20%, #1c1c1e, #000);
        }

        #island {
            position: fixed; top: 12px; left: 50%;
            transform: translateX(-50%) scale(0.7);
            width: 125px; height: 36px; background: #000;
            border-radius: 50px; z-index: 9999; opacity: 0;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1.4);
            border: 0.5px solid rgba(255,255,255,0.15);
        }
        #island.expand {
            opacity: 1; width: calc(100% - 32px); max-width: 390px;
            height: auto; top: 20px; transform: translateX(-50%) scale(1);
            padding: 24px; border-radius: 38px;
        }

        .marquee-container {
            width: 100%; overflow: hidden; white-space: nowrap; margin-top: 10px;
        }
        .marquee-text {
            display: inline-block;
            animation: marquee 12s linear infinite;
            font-size: 10px; font-weight: 800; color: #FF3B30;
            text-transform: uppercase; letter-spacing: 1px;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(210%);
            -webkit-backdrop-filter: blur(40px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 48px;
        }

        .shimmer {
            background: linear-gradient(90deg, #fff 0%, #555 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        
        .btn-tap:active { transform: scale(0.92); transition: 0.1s; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="bg-gradient"></div>

    <div id="island" class="flex flex-col items-center">
        <div id="islandContent" class="hidden text-center w-full">
            <div class="w-12 h-12 bg-white text-black rounded-[14px] flex items-center justify-center mx-auto mb-4 font-black italic shadow-2xl">R</div>
            <p class="text-[11px] font-semibold text-gray-300 mb-5 px-2 tracking-tight">
                Waspada akun bind ❌ gmaii.com. Cek domain resmi ✅ gmail.com sebelum payment!
            </p>
            <div class="flex gap-2">
                <a href="https://whatsapp.com/channel/0029VbCXhPGLI8YdXdUg7s27" class="flex-1 py-3.5 bg-white text-black rounded-[18px] font-bold text-[10px] btn-tap text-center">CHANNEL 💬</a>
                <button onclick="closeIsland()" class="flex-1 py-3.5 bg-white/10 rounded-[18px] font-bold text-[10px] text-white btn-tap">OK 👍</button>
            </div>
        </div>
    </div>

    <main class="w-full max-w-sm px-6">
        <div class="text-center mb-10">
            <h1 class="text-[110px] font-black italic tracking-tighter leading-none shimmer mb-1">SC.</h1>
            <p class="text-[9px] tracking-[0.6em] font-extrabold text-blue-500 uppercase opacity-90">Rapz Security</p>
            
            <div class="marquee-container">
                <span class="marquee-text italic">
                    ⚠️ PERINGATAN: HARAP BERHATI-HATI SAAT MEMBELI AKUN BIND ON, PASTIKAN DOMAIN ADALAH GMAIL.COM BUKAN DOMAIN PALSU SEPERTI GMAII.COM! 🛑
                </span>
            </div>
        </div>

        <div class="glass-box p-2 shadow-2xl">
            <div class="bg-black/40 rounded-[44px] p-6 md:p-8 space-y-8">
                <input 
                    type="text" id="email" placeholder="Cek Email Target... 🔍"
                    class="w-full p-5 rounded-[24px] bg-white/5 border border-transparent outline-none text-lg font-bold text-white placeholder-gray-700 focus:bg-white/10 transition-all btn-tap"
                    spellcheck="false" autocomplete="off"
                >

                <div id="result" class="hidden transition-all duration-500 transform translate-y-4 opacity-0">
                    <div id="statusCard" class="relative overflow-hidden p-8 rounded-[38px] shadow-2xl">
                        <div id="glow" class="absolute -top-10 -right-10 w-32 h-32 blur-[60px] opacity-40"></div>
                        <div class="relative z-10 flex flex-col space-y-4">
                            <div class="flex justify-between items-center">
                                <span id="badge" class="text-[8px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full"></span>
                                <span id="domainDisplay" class="text-[10px] font-mono font-bold opacity-30 tracking-tighter"></span>
                            </div>
                            <h2 id="statusTitle" class="text-3xl font-black italic tracking-tight"></h2>
                            <p id="statusMsg" class="text-[13px] font-bold leading-relaxed opacity-90"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 flex flex-col items-center gap-6">
            <div class="flex gap-8 text-[10px] font-black text-gray-500 tracking-tighter">
                <a href="https://check.rapzz.eu.cc" class="btn-tap hover:text-white uppercase">Website 🌐</a>
                <a href="https://whatsapp.com/channel/0029VbCXhPGLI8YdXdUg7s27" class="btn-tap hover:text-white uppercase">WhatsApp 📲</a>
            </div>
            <div class="w-10 h-1 bg-white/5 rounded-full"></div>
        </div>
    </main>

    <script>
        window.onload = () => {
            twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
            setTimeout(() => {
                document.getElementById('island').classList.add('expand');
                setTimeout(() => document.getElementById('islandContent').classList.remove('hidden'), 300);
            }, 500);
        };

        function closeIsland() {
            document.getElementById('islandContent').classList.add('hidden');
            setTimeout(() => { document.getElementById('island').classList.remove('expand'); document.getElementById('island').style.top = "-120px"; }, 200);
        }

        const email = document.getElementById('email');
        const result = document.getElementById('result');
        const statusCard = document.getElementById('statusCard');
        const badge = document.getElementById('badge');
        const title = document.getElementById('statusTitle');
        const msg = document.getElementById('statusMsg');

        email.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            if(val.includes('@')) {
                const dom = val.split('@')[1];
                if(dom === "") { result.classList.add('opacity-0'); return; }
                result.classList.remove('hidden');
                setTimeout(() => { result.classList.add('opacity-100'); result.classList.remove('translate-y-4'); }, 10);
                document.getElementById('domainDisplay').innerText = dom;

                if(dom === 'gmail.com') {
                    statusCard.className = "relative overflow-hidden p-8 rounded-[38px] bg-[#34C759] text-white";
                    badge.innerText = "VERIFIED GOOGLE ✅";
                    title.innerText = "AMAN!";
                    msg.innerHTML = "Domain resmi Google terdeteksi. Aman digunakan! ✨";
                } else if(dom === 'gmaii.com' || dom === 'gmaiil.com') {
                    statusCard.className = "relative overflow-hidden p-8 rounded-[38px] bg-[#FF3B30] text-white animate-pulse";
                    badge.innerText = "DANGER TYPO ⚠️";
                    title.innerText = "PENIPUAN!";
                    msg.innerHTML = "Ini domain palsu jebakan! 🛑 <b>STOP</b>, jangan bayar.";
                } else {
                    statusCard.className = "relative overflow-hidden p-8 rounded-[38px] bg-zinc-900 border border-white/10 text-gray-400";
                    badge.innerText = "NOT GOOGLE 👤";
                    title.innerText = "BUKAN GMAIL";
                    msg.innerHTML = "Email menggunakan domain kustom. Hati-hati! 🛡️";
                }
                twemoji.parse(statusCard);
            } else {
                result.classList.add('opacity-0');
            }
        });
    </script>
</body>
</html>
